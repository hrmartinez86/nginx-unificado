worker_processes 1;

events {
  worker_connections 1024;
}

http {
  sendfile on;
  client_max_body_size 100M;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # ---------- UPSTREAMS POR PROYECTO ----------

  # Veterinary
  upstream vet_backend {
    server vet_backend:4001;
  }
  upstream vet_frontend {
    server vet_frontend:80;
  }

  # Ticket
  upstream ticket_back {
    server ticket-back:3001;
  }
  upstream ticket_frontend {
    server ticket-front:5173;
  }
  upstream ticket_whatsapp {
    server ticket-whatsapp:3002;
  }
  upstream ticket_ollama {
    server ticket-ollama:11434;
  }

  # Trello
  upstream trello_backend {
    server trello_backend:5000;
  }
  upstream trello_frontend {
    server trello_frontend:5173;
  }

  # LabHarmony
  upstream harmony_backend {
    server labHarmony-back:3000;
  }
  upstream harmony_frontend {
    server labHarmony-front:80;
  }

  # ---------- SERVIDOR: VETERINARY ----------
  server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name veterinary.rudev86.it.com www.veterinary.rudev86.it.com;

    ssl_certificate     /etc/letsencrypt/live/veterinary.rudev86.it.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veterinary.rudev86.it.com/privkey.pem;

    location /api/ {
      client_max_body_size 100M;
      proxy_pass         http://vet_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass         http://vet_frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
    }
  }

  # ---------- SERVIDOR: TICKET ----------
  server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name ticket.rudev86.it.com www.ticket.rudev86.it.com;

    ssl_certificate     /etc/letsencrypt/live/ticket.rudev86.it.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ticket.rudev86.it.com/privkey.pem;

    location /api/ {
      client_max_body_size 100M;
      proxy_pass         http://ticket-back;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /whatsapp/ {
      proxy_pass         http://ticket_whatsapp/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;

      add_header 'Access-Control-Allow-Origin'  '*' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
      add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin'  '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
        add_header 'Content-Length' 0;
        return 204;
      }
    }

    location /ollama/ {
      proxy_pass         http://ticket_ollama/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    location /@vite/client {
      proxy_pass         http://ticket_frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }

    location ~ ^/(__vite_ping|@fs|@id|@react-refresh) {
      proxy_pass         http://ticket_frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }

    location / {
      proxy_pass         http://ticket_frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
    }
  }

  # ---------- SERVIDOR: TRELLO ----------
  server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name trello.rudev86.it.com www.trello.rudev86.it.com;

    ssl_certificate     /etc/letsencrypt/live/trello.rudev86.it.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trello.rudev86.it.com/privkey.pem;

    location /api/ {
      client_max_body_size 100M;
      proxy_pass         http://trello_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass         http://trello_frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
    }
  }

  # ---------- SERVIDOR: LABHARMONY ----------
  server {
    listen 80;
    listen [::]:80;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name harmony.rudev86.it.com www.harmony.rudev86.it.com;

    ssl_certificate     /etc/letsencrypt/live/harmony.rudev86.it.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/harmony.rudev86.it.com/privkey.pem;

    location /api/ {
      client_max_body_size 100M;
      proxy_pass         http://harmony_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass         http://harmony_frontend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
    }
  }
}
